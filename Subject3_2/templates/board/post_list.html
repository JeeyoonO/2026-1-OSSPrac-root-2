<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>ROOT 게시판</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/board.css') }}">
</head>
<body>

<header class="navbar">
    <div class="nav-inner">
        <a href="{{ url_for('index') }}" class="logo">OSSPrac</a>

        <nav class="nav-menu">
            <a href="{{ url_for('index') }}">ROOT팀 소개</a>
            <a href="{{ url_for('board_list') }}" class="active">질문게시판</a>
            <a href="{{ url_for('input_page') }}">팀페이지 제작</a>
            <a href="{{ url_for('contact') }}">Contact</a>
            <button id="darkModeBtn" class="dark-mode-btn" type="button">🌙</button>
        </nav>
    </div>
</header>

<main class="board-page">
    <section class="board-card">

        <div class="board-title-box">
            <h1>질문게시판</h1>
            <p>ROOT팀에게 궁금한 점을 자유롭게 남겨주세요.</p>
        </div>

        <div class="board-top">
            <p>
                총 <strong>{{ posts|length }}개</strong>의 질문이 등록되어 있습니다.
            </p>

            <a href="{{ url_for('board_write') }}" class="write-btn">새 글 작성</a>
        </div>

        <table class="board-table">
            <thead>
                <tr>
                    <th>번호</th>
                    <th>제목</th>
                    <th>작성자</th>
                    <th>작성일</th>
                </tr>
            </thead>

            <tbody>
                {% for post in posts %}
                <tr class="post-row">
                    <td>{{ loop.revindex }}</td>

                    <td class="post-title">
                        <a href="{{ url_for('board_detail', post_id=post.id) }}">
                            {{ post.title }}
                        </a>
                    </td>

                    <td class="post-author">{{ post.author }}</td>
                    <td>{{ post.date }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

        {% if not posts %}
        <div style="text-align: center; padding: 40px; color: #888;">
            <p>아직 작성된 게시글이 없습니다.</p>
        </div>
        {% endif %}

        <div class="board-bottom">
            <div></div>

            <form class="search-box" onsubmit="searchPosts(event)">
                <select id="searchType">
                    <option value="all">전체</option>
                    <option value="title">제목</option>
                    <option value="author">작성자</option>
                </select>

                <input type="text" id="searchInput" placeholder="검색어를 입력하세요">

                <button type="submit">검색</button>
            </form>
        </div>

    </section>
</main>

<script>
const darkModeBtn = document.getElementById("darkModeBtn");

if (localStorage.getItem("darkMode") === "on") {
    document.body.classList.add("dark-mode");
    if (darkModeBtn) darkModeBtn.textContent = "☀️";
}

if (darkModeBtn) {
    darkModeBtn.addEventListener("click", function () {
        document.body.classList.toggle("dark-mode");

        if (document.body.classList.contains("dark-mode")) {
            localStorage.setItem("darkMode", "on");
            darkModeBtn.textContent = "☀️";
        } else {
            localStorage.setItem("darkMode", "off");
            darkModeBtn.textContent = "🌙";
        }
    });
}

function searchPosts(event) {
    event.preventDefault();

    const keyword = document.getElementById("searchInput").value.trim();
    const searchType = document.getElementById("searchType").value;
    const rows = document.querySelectorAll(".post-row");

    rows.forEach(row => {

        const titleLink = row.querySelector(".post-title a");
        const authorCell = row.querySelector(".post-author");

        const originalTitle = titleLink.textContent.trim();
        const originalAuthor = authorCell.textContent.trim();

        // 초기화
        titleLink.innerHTML = originalTitle;
        authorCell.innerHTML = originalAuthor;

        if (keyword === "") {
            row.style.display = "";
            return;
        }

        let targetText = "";

        if (searchType === "title") {
            targetText = originalTitle;

        } else if (searchType === "author") {
            targetText = originalAuthor;

        } else {
            targetText = originalTitle + " " + originalAuthor;
        }

        if (targetText.includes(keyword)) {

            row.style.display = "";

           // 제목 하이라이트
            if (
                (searchType === "title" || searchType === "all")
                && originalTitle.includes(keyword)
            ) {
                titleLink.innerHTML =
                    highlightText(originalTitle, keyword);
            }

            // 작성자 하이라이트
            if (
                (searchType === "author" || searchType === "all")
                && originalAuthor.includes(keyword)
            ) {
                authorCell.innerHTML =
                    highlightText(originalAuthor, keyword);
            }

        } else {
            row.style.display = "none";
        }
    });
}

function highlightText(text, keyword) {

    const cleanKeyword = keyword.trim();

    return text.replaceAll(
        cleanKeyword,
        `<span class="highlight">${cleanKeyword}</span>`
    );
}
</script>
</body>
</html>
